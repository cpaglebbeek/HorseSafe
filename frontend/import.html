<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HorseSafe — Importeren</title>
  <link rel="icon" type="image/svg+xml" href="assets/horsesafe.svg">
  <link rel="stylesheet" href="assets/horsesafe.css">
  <style>
    .preview-table { max-height: 300px; overflow-y: auto; margin: var(--hs-sp-3) 0; }
    .preview-table table { font-size: 0.875rem; }
  </style>
</head>
<body>
  <div class="container">
    <header class="brand">
      <img src="assets/horsesafe.svg" alt="HorseSafe">
      <h1>HorseSafe</h1>
      <span class="slogan">Importeren</span>
    </header>

    <main>
      <section class="card">
        <h2>1. Bron + vault-wachtwoord</h2>
        <p class="muted">
          Bestand wordt <strong>uitsluitend in je browser</strong> verwerkt. Server ziet
          enkel de uiteindelijke encrypted KDBX-blob.
        </p>

        <form id="import-form">
          <label for="format">Format</label>
          <select id="format" required>
            <option value="kdbx">KDBX3/KDBX4 (KeePass / KeePassXC)</option>
            <option value="bitwarden">Bitwarden JSON (unencrypted export)</option>
            <option value="csv">KeePass-CSV</option>
          </select>

          <label for="file">Bestand</label>
          <input type="file" id="file" required>

          <label for="kdbx-pw">KDBX-wachtwoord <span class="muted">(alleen bij KDBX-import)</span></label>
          <input type="password" id="kdbx-pw" autocomplete="off">

          <label for="vault-pw">HorseSafe vault-wachtwoord</label>
          <input type="password" id="vault-pw" required>

          <label for="conflict">Conflict-strategie</label>
          <select id="conflict">
            <option value="skip">Skip dubbele entries (Title+Username)</option>
            <option value="overwrite">Overschrijf bestaande</option>
            <option value="duplicate">Dupliceer (met suffix)</option>
          </select>

          <div id="import-error" class="error" hidden></div>

          <div class="actions">
            <button type="submit" id="preview-btn">Lees + Preview</button>
            <a href="vault.html"><button type="button" class="secondary">Annuleer</button></a>
          </div>
        </form>
      </section>

      <section class="card" id="preview-section" hidden>
        <h2>2. Preview <span class="muted" id="preview-count"></span></h2>
        <div class="preview-table">
          <table>
            <thead><tr><th>Titel</th><th>Gebruikersnaam</th><th>URL</th></tr></thead>
            <tbody id="preview-body"></tbody>
          </table>
        </div>
        <div id="import-status" class="muted"></div>
        <div class="actions">
          <button id="commit-btn">Bevestig + voeg toe aan vault</button>
          <button id="reset-btn" class="secondary">Opnieuw</button>
        </div>
      </section>
    </main>

    <footer>HorseSafe v0.0.5-Shamir — import volledig client-side (zero-knowledge)</footer>
  </div>

  <script src="vendor/kdbxweb/kdbxweb.min.js"></script>
  <script src="vendor/argon2/argon2-bundled.min.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/crypto.js"></script>
  <script src="js/import-export.js"></script>
  <script>
    (function () {
      'use strict';
      function $(id) { return document.getElementById(id); }
      let parsedEntries = null;
      let currentDb = null;
      let currentVaultId = null;
      let currentEtag = null;

      $('import-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        $('import-error').hidden = true;
        $('preview-section').hidden = true;
        $('preview-btn').disabled = true;
        try {
          const fmt = $('format').value;
          const fileEl = $('file');
          const file = fileEl.files[0];
          if (!file) { throw new Error('Geen bestand geselecteerd'); }
          const vaultPw = $('vault-pw').value;
          if (!vaultPw) { throw new Error('Vault-wachtwoord vereist'); }

          // 1. Lees + parse import
          if (fmt === 'kdbx') {
            const buf = await file.arrayBuffer();
            const importDb = await window.HorseSafeCrypto.openDatabase(buf, $('kdbx-pw').value);
            parsedEntries = window.HorseSafeImportExport.extractEntries(importDb);
          } else if (fmt === 'bitwarden') {
            const text = await file.text();
            parsedEntries = window.HorseSafeImportExport.parseBitwardenJson(text);
          } else if (fmt === 'csv') {
            const text = await file.text();
            parsedEntries = window.HorseSafeImportExport.parseKeePassCsv(text);
          }

          // 2. Laad HorseSafe-vault
          const listRes = await window.HorseSafeAPI.listVaults();
          if (!listRes.ok || listRes.data.length === 0) {
            throw new Error('Geen HorseSafe-vault gevonden. Maak eerst een vault aan.');
          }
          const meta = listRes.data[0];
          const readRes = await window.HorseSafeAPI.readVault(meta.id);
          if (!readRes.ok) throw new Error('Kan vault niet laden');
          currentDb = await window.HorseSafeCrypto.openDatabase(readRes.blob, vaultPw);
          currentVaultId = meta.id;
          currentEtag = readRes.etag;

          // 3. Toon preview
          $('preview-count').textContent = `(${parsedEntries.length} entries gevonden)`;
          const tbody = $('preview-body');
          tbody.innerHTML = '';
          for (const e of parsedEntries.slice(0, 100)) {
            const tr = document.createElement('tr');
            tr.innerHTML = `<td>${escapeHtml(e.title)}</td><td>${escapeHtml(e.username)}</td><td>${escapeHtml(e.url)}</td>`;
            tbody.appendChild(tr);
          }
          if (parsedEntries.length > 100) {
            const tr = document.createElement('tr');
            tr.innerHTML = `<td colspan="3" class="muted">… en ${parsedEntries.length - 100} meer</td>`;
            tbody.appendChild(tr);
          }
          $('preview-section').hidden = false;
        } catch (err) {
          $('import-error').textContent = 'Fout: ' + err.message;
          $('import-error').hidden = false;
        } finally {
          $('preview-btn').disabled = false;
        }
      });

      $('commit-btn').addEventListener('click', async () => {
        if (!currentDb || !parsedEntries) return;
        $('commit-btn').disabled = true;
        try {
          const strategy = $('conflict').value;
          const result = window.HorseSafeImportExport.mergeEntriesInto(currentDb, parsedEntries, strategy);
          const blob = await window.HorseSafeCrypto.saveDatabase(currentDb);
          const putRes = await window.HorseSafeAPI.updateVault(currentVaultId, blob, currentEtag);
          if (!putRes.ok) throw new Error('Upload-fout ' + putRes.status);
          // Audit-stamp
          await fetch(window.HorseSafeAPI.base + `/vault/${currentVaultId}/audit-import`, {
            method: 'POST', credentials: 'include',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ format: $('format').value, count: result.added }),
          });
          $('import-status').textContent = `✅ ${result.added} toegevoegd, ${result.skipped} overgeslagen.`;
          setTimeout(() => { window.location.href = 'vault.html'; }, 2000);
        } catch (err) {
          $('import-error').textContent = 'Save-fout: ' + err.message;
          $('import-error').hidden = false;
        } finally {
          $('commit-btn').disabled = false;
        }
      });

      $('reset-btn').addEventListener('click', () => {
        parsedEntries = null; currentDb = null;
        $('preview-section').hidden = true;
        $('import-form').reset();
      });

      function escapeHtml(s) {
        return String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
      }
    })();
  </script>
</body>
</html>
