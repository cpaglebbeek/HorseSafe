<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HorseSafe — Importeren</title>
  <link rel="icon" type="image/svg+xml" href="assets/horsesafe.svg">
  <link rel="stylesheet" href="assets/horsesafe.css">
  <style>
    .preview-table { max-height: 300px; overflow-y: auto; margin: var(--hs-sp-3) 0; }
    .preview-table table { font-size: 0.875rem; }
  </style>
</head>
<body>
  <div class="container">
    <header class="brand">
      <img src="assets/horsesafe.svg" alt="HorseSafe">
      <h1>HorseSafe</h1>
      <span class="slogan">Importeren</span>
    </header>

    <main>
      <section class="card">
        <h2>1. Bron + vault-wachtwoord</h2>
        <p class="muted">
          Bestand wordt <strong>uitsluitend in je browser</strong> verwerkt. Server ziet
          enkel de uiteindelijke encrypted KDBX-blob.
        </p>

        <form id="import-form">
          <label for="format">Format</label>
          <select id="format" required>
            <option value="kdbx">KDBX3/KDBX4 (KeePass / KeePassXC)</option>
            <option value="bitwarden">Bitwarden JSON (unencrypted export)</option>
            <option value="csv">KeePass-CSV</option>
          </select>

          <label for="file">Bestand</label>
          <input type="file" id="file" required>

          <label for="kdbx-pw">KDBX-wachtwoord <span class="muted">(alleen bij KDBX-import)</span></label>
          <input type="password" id="kdbx-pw" autocomplete="off">

          <label for="vault-pw">HorseSafe vault-wachtwoord</label>
          <input type="password" id="vault-pw" required>

          <label for="conflict">Conflict-strategie</label>
          <select id="conflict">
            <option value="skip">Skip dubbele entries (Title+Username)</option>
            <option value="overwrite">Overschrijf bestaande</option>
            <option value="duplicate">Dupliceer (met suffix)</option>
          </select>

          <div id="import-error" class="error" hidden></div>

          <div class="actions">
            <button type="submit" id="preview-btn">Lees + Preview</button>
            <a href="vault.html"><button type="button" class="secondary">Annuleer</button></a>
          </div>
        </form>
      </section>

      <section class="card" id="preview-section" hidden>
        <h2>2. Preview <span class="muted" id="preview-count"></span></h2>
        <div class="preview-table">
          <table>
            <thead><tr><th>Titel</th><th>Gebruikersnaam</th><th>URL</th></tr></thead>
            <tbody id="preview-body"></tbody>
          </table>
        </div>
        <div id="import-status" class="muted"></div>
        <div class="actions">
          <button id="commit-btn">Bevestig + voeg toe aan vault</button>
          <button id="reset-btn" class="secondary">Opnieuw</button>
        </div>
      </section>
    </main>

    <footer>HorseSafe v0.0.5-Shamir — import volledig client-side (zero-knowledge)</footer>
  </div>

  <script src="vendor/kdbxweb/kdbxweb.min.js"></script>
  <script src="vendor/argon2/argon2-bundled.min.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/crypto.js"></script>
  <script src="js/import-export.js"></script>
  <script src="js/page-import.js"></script>
</body>
</html>
