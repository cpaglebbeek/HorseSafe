# HorseSafe nginx-snippet v0.0.7-Bellare
# Include vanuit /etc/nginx/sites-enabled/horsecloud55 server-block via:
#   include /etc/nginx/snippets/horsesafe.conf;
#
# APPENDABLE — voeg alleen toe, vervang nooit andere location-blocks.

location /HorseSafe/api/ {
    # HorseSafe heeft eigen JWT + MFA — schakel HorseCloud basic-auth uit
    auth_basic off;

    proxy_pass http://127.0.0.1:3997/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
    client_max_body_size 50M;
}

location /HorseSafe/ {
    auth_basic off;
    alias /opt/horsesafe/web/;
    try_files $uri $uri/ /HorseSafe/index.html;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; connect-src 'self'; img-src 'self' data:; frame-ancestors 'none'; form-action 'self'; base-uri 'self'; object-src 'none'" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
}
