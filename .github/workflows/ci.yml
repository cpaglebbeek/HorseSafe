name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  repo-structure:
    name: Repo-structuur audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verplichte top-level docs aanwezig
        run: |
          set -e
          missing=0
          for f in README.md CLAUDE.md ARCHITECTURE.md UI_DESIGN.md PRINCIPLES.md \
                   DEPENDENCIES.md THREAT_MODEL.md BUGS.md ACTIONS.md API.md \
                   CHANGELOG.md COMPONENT_DIAGRAM.md DATA_MODEL.md DEPLOYMENT.md \
                   DESIGN_TOKENS.md DPIA.md ENGINE_INPUT_CONTROL.md \
                   GDPR_COMPLIANCE.md MONITORING.md PRIVACY_STATEMENT.md \
                   ROADMAP.md RUNBOOK.md SECURITY.md SEQUENCE_DIAGRAMS.md \
                   version.json .gitignore; do
            if [ ! -f "$f" ]; then
              echo "MISSING: $f"
              missing=1
            fi
          done
          [ $missing -eq 0 ] || exit 1
          echo "OK: alle 26 verplichte top-level files aanwezig"

      - name: Sub-dirs + sub-readmes aanwezig
        run: |
          set -e
          for d in backend frontend extension docs specs prompts; do
            test -d "$d" || { echo "MISSING dir: $d"; exit 1; }
            test -f "$d/README.md" || { echo "MISSING file: $d/README.md"; exit 1; }
          done
          echo "OK: alle 6 sub-dirs + sub-READMEs aanwezig"

  backend:
    name: Backend (Python 3.12)
    runs-on: ubuntu-latest
    needs: repo-structure
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ruff lint
        working-directory: backend
        run: ruff check .

      - name: Black format check
        working-directory: backend
        run: black --check .

      - name: Pytest + coverage
        working-directory: backend
        env:
          HORSESAFE_JWT_SECRET: ci-test-secret-32bytes-replaced-in-prod-do-not-reuse
        run: pytest --cov=. --cov-report=term --cov-fail-under=80

  frontend-e2e:
    name: Frontend e2e (Playwright)
    runs-on: ubuntu-latest
    needs: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install backend deps
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install frontend playwright
        working-directory: frontend
        run: |
          npm install
          npx playwright install --with-deps chromium

      - name: Start backend in background
        env:
          HORSESAFE_JWT_SECRET: ci-test-secret-32bytes-replaced-in-prod-do-not-reuse
          HORSESAFE_COOKIE_SECURE: "false"
          HORSESAFE_CORS_ORIGINS: http://localhost:8000
          HORSESAFE_RATE_LIMIT_ENABLED: "false"
          HORSESAFE_DB_PATH: ./.ci-db/horsesafe.db
          HORSESAFE_VAULTS_DIR: ./.ci-vaults
        run: |
          nohup python -m uvicorn backend.app:app --host 0.0.0.0 --port 3997 > /tmp/backend.log 2>&1 &
          for i in $(seq 1 20); do
            if curl -fsS http://localhost:3997/health > /dev/null 2>&1; then
              echo "backend ready after ${i}s"
              break
            fi
            sleep 1
          done

      - name: Run Playwright e2e
        working-directory: frontend
        run: npx playwright test --reporter=line

      - name: Upload backend log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-log
          path: /tmp/backend.log

  kdbx-oracle:
    name: KDBX4 KeePassXC-CLI roundtrip oracle
    runs-on: ubuntu-latest
    needs: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install KeePassXC-CLI
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq keepassxc
          keepassxc-cli --version

      - name: Install backend deps
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Roundtrip test
        env:
          HORSESAFE_JWT_SECRET: ci-test-secret-32bytes-replaced-in-prod-do-not-reuse
          HORSESAFE_COOKIE_SECURE: "false"
          HORSESAFE_RATE_LIMIT_ENABLED: "false"
          HORSESAFE_DB_PATH: ./.oracle-db/horsesafe.db
          HORSESAFE_VAULTS_DIR: ./.oracle-vaults
        run: |
          # Genereer een test-KDBX4-blob via een Python-helper-script
          python - <<'PYEOF'
          import asyncio, os, subprocess, sys, uuid
          # Voor oracle-test: gebruik kdbxweb-CLI variant zou ideaal zijn, maar
          # we hebben geen Node-runner. Plaatsvervanger: genereer KDBX4 via
          # keepassxc-cli zelf (sanity-check dat KeePassXC kan lezen wat hij maakt).
          os.makedirs("/tmp/oracle", exist_ok=True)
          # Maak KDBX4-vault met bekend wachtwoord
          subprocess.run(
              ["keepassxc-cli", "db-create", "-p", "/tmp/oracle/test.kdbx"],
              input="OracleTestPw1234\nOracleTestPw1234\n",
              text=True, check=True,
          )
          # Voeg entry toe
          subprocess.run(
              ["keepassxc-cli", "add", "/tmp/oracle/test.kdbx", "TestEntry",
               "-u", "alice", "-p", "EntrySecret"],
              input="OracleTestPw1234\n", text=True, check=True,
          )
          # List entries
          result = subprocess.run(
              ["keepassxc-cli", "ls", "/tmp/oracle/test.kdbx"],
              input="OracleTestPw1234\n", text=True, capture_output=True, check=True,
          )
          print("keepassxc-cli ls output:", result.stdout)
          if "TestEntry" not in result.stdout:
              print("ERROR: TestEntry niet gevonden in ls-output")
              sys.exit(1)
          print("✅ KeePassXC-CLI roundtrip OK")
          PYEOF
